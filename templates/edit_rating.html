<!DOCTYPE html>
<html>
<head>
    <title>Edit Rating</title>
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>

<h1>Edit Rating</h1>

<h2>{{ user.name }}</h2>
<h3>{{ movie.title }}</h3>
<p>{{ movie.year }}</p>

{% if movie.poster_url %}
    <img
        src="{{ movie.poster_url }}"
        class="movie-poster"
    >
{% endif %}

<form method="POST">

    <div
        class="stars"
        onmouseleave="resetRating()">

        {% for i in range(1,11) %}
            <span
                class="star"
                onclick="setRating({{i}})"
                onmouseenter="hoverRating({{i}})">
                ☆
            </span>
        {% endfor %}

    </div>

    <p id="rating-display">
        {% if rating.seen %}
            Rating: {{ rating.rating }}/10
        {% else %}
            Not Seen
        {% endif %}
    </p>

    <input
        type="hidden"
        name="rating"
        id="rating"
        value="{% if rating.seen %}{{ rating.rating }}{% else %}-1{% endif %}"
    >

    <br>

    <button
        type="button"
        onclick="notSeen()">
        Haven't Seen
    </button>

    <button type="submit">
        Save Changes
    </button>

</form>

<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
